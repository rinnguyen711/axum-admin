[package]
name = "axum-admin"
version = "0.1.0"
edition = "2021"
description = "A modern admin dashboard framework for Axum"
license = "MIT"

[dependencies]
async-trait = "0.1"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
thiserror = "1"

[dev-dependencies]
tokio = { version = "1", features = ["macros", "rt-multi-thread"] }

[features]
seaorm = []
