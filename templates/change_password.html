{% extends "layout.html" %}
{% block title %}Change Password – {{ admin_title }}{% endblock %}
{% block content %}
<div class="max-w-md">
  <h1 class="text-xl font-semibold text-zinc-900 mb-6">Change Password</h1>

  {% if error %}
  <div class="mb-4 px-4 py-3 rounded-md bg-red-50 border border-red-200 text-red-700 text-sm">
    {{ error }}
  </div>
  {% endif %}

  {% if success %}
  <div class="mb-4 px-4 py-3 rounded-md bg-emerald-50 border border-emerald-200 text-emerald-800 text-sm">
    {{ success }}
  </div>
  {% endif %}

  <form method="post" action="/admin/change-password" class="space-y-4">
    <input type="hidden" name="csrf_token" value="{{ csrf_token }}" />
    <div>
      <label class="block text-sm font-medium text-zinc-700 mb-1">Current password</label>
      <input type="password" name="current_password" required
             class="w-full px-3 py-2 border border-zinc-300 rounded-md text-sm focus:outline-none focus:ring-2 focus:ring-zinc-900" />
    </div>
    <div>
      <label class="block text-sm font-medium text-zinc-700 mb-1">New password</label>
      <input type="password" name="new_password" required
             class="w-full px-3 py-2 border border-zinc-300 rounded-md text-sm focus:outline-none focus:ring-2 focus:ring-zinc-900" />
    </div>
    <div>
      <label class="block text-sm font-medium text-zinc-700 mb-1">Confirm new password</label>
      <input type="password" name="confirm_password" required
             class="w-full px-3 py-2 border border-zinc-300 rounded-md text-sm focus:outline-none focus:ring-2 focus:ring-zinc-900" />
    </div>
    <button type="submit"
            class="px-4 py-2 bg-zinc-900 text-white text-sm font-medium rounded-md hover:bg-zinc-700 transition-colors">
      Update password
    </button>
  </form>
</div>
{% endblock %}
